model:
  vocab_size: 257
  block_size: 128
  n_layer: 4
  n_head: 4
  n_embd: 128
  dropout: 0.1
  bias: true

training:
  batch_size: 16
  max_steps: 500
  gradient_accumulation_steps: 1
  learning_rate: 0.001
  min_learning_rate: 0.0001
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  warmup_steps: 20
  eval_interval: 100
  eval_batches: 10
  log_interval: 10
  save_interval: 100
  num_workers: 0
  amp: false
  compile: false
  seed: 1337

data:
  stride: 64
  encoding: utf-8
