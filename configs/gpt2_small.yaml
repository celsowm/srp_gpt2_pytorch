model:
  vocab_size: 50257
  block_size: 1024
  n_layer: 12
  n_head: 12
  n_embd: 768
  dropout: 0.1
  bias: true

training:
  batch_size: 4
  max_steps: 100000
  gradient_accumulation_steps: 8
  learning_rate: 0.0006
  min_learning_rate: 0.00006
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  warmup_steps: 2000
  eval_interval: 1000
  eval_batches: 50
  log_interval: 10
  save_interval: 1000
  num_workers: 2
  amp: true
  compile: false
  seed: 1337

data:
  stride: 1024
  encoding: utf-8
